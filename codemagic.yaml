workflows:
  ios-build:
    name: KioskM iOS Build

    environment:
      xcode: latest
      node: latest

    scripts:
      - |
        set -ex
        npm install
        npx cap add ios
        npx cap sync ios
        cd ios/App
        xcodebuild \
          -project App.xcodeproj \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          build

    artifacts:
      - ios/App/build/Build/Products/Release-iphoneos/*.app