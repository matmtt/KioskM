<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif}
*{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
#frame{border:0;width:100%;height:100%;display:block}
#hot{position:fixed;top:0;left:0;width:60px;height:60px;z-index:10;background:transparent}
#pwd{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:20}
#box{background:#fff;padding:24px;border-radius:12px;min-width:340px;max-width:90%}
#box h3{margin:0 0 16px 0;font-size:18px;color:#000}
#box label{display:block;margin:12px 0 4px 0;font-size:13px;color:#555}
#box input{font-size:16px;width:100%;padding:10px;box-sizing:border-box;border:1px solid #ccc;border-radius:6px;-webkit-user-select:text;user-select:text}
#box .actions{display:flex;gap:8px;margin-bottom:16px}
#box .actions button{flex:1;padding:14px 8px;font-size:14px;font-weight:500}
#box hr{border:0;border-top:1px solid #eee;margin:16px 0}
#box .row{display:flex;gap:8px;margin-top:20px}
#box button{padding:12px;font-size:15px;border:0;border-radius:6px;background:#c9a24b;color:#fff;font-weight:600;cursor:pointer}
#box button.sec{background:#999}
#box button.alt{background:#2a5d9f}
#box button.warn{background:#8a4a2a}
#box .row button{flex:1}
#toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:30;display:none}
</style>
</head>
<body>
<iframe id="frame" allow="fullscreen"></iframe>
<div id="hot"></div>
<div id="toast"></div>
<div id="pwd">
<div id="box">
<h3 id="title">Senha admin</h3>
<div id="step1"><label>Senha</label><input id="pin" type="password" inputmode="numeric"></div>
<div id="step2" style="display:none">
<div class="actions">
<button id="reload" class="alt">Recarregar</button>
<button id="clearcache" class="warn">Limpar cache</button>
</div>
<hr>
<label>URL</label><input id="url" type="url">
<label>Nova senha (deixe vazio pra manter)</label><input id="newp" type="password">
</div>
<div class="row"><button id="ok">OK</button><button id="cancel" class="sec">Cancelar</button></div>
</div>
</div>
<script>
const cfg=JSON.parse(localStorage.getItem('kioskm')||'{}');
const state={url:cfg.url||'https://www.mateusadv.com/kiosk',pass:cfg.pass||'0000'};
const f=document.getElementById('frame'),hot=document.getElementById('hot'),pwd=document.getElementById('pwd'),pin=document.getElementById('pin'),urlI=document.getElementById('url'),newp=document.getElementById('newp'),s1=document.getElementById('step1'),s2=document.getElementById('step2'),title=document.getElementById('title'),toast=document.getElementById('toast');
f.src=state.url;

// Bloqueios globais
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('dragstart',e=>e.preventDefault());
window.addEventListener('beforeunload',e=>{e.preventDefault();e.returnValue=''});
let lastTap=0;
document.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<300)e.preventDefault();lastTap=now},{passive:false});

// 5-tap no canto superior esquerdo
let taps=[],timer=null;
function tap(){const n=Date.now();taps=taps.filter(v=>n-v<2000);taps.push(n);if(taps.length>=5){taps=[];openPwd()}}
hot.addEventListener('touchstart',tap,{passive:true});
hot.addEventListener('click',tap);

function openPwd(){pwd.style.display='flex';pin.value='';s1.style.display='block';s2.style.display='none';title.textContent='Senha admin';setTimeout(()=>pin.focus(),100);clearTimeout(timer);timer=setTimeout(closePwd,60000)}
function closePwd(){pwd.style.display='none';clearTimeout(timer)}
function showToast(msg){toast.textContent=msg;toast.style.display='block';setTimeout(()=>toast.style.display='none',1800)}

function reloadFrame(bypassCache){
  const u=state.url;
  if(bypassCache){
    const sep=u.includes('?')?'&':'?';
    f.src=u+sep+'_t='+Date.now();
    showToast('Cache limpo — recarregando');
  }else{
    f.src=u;
    showToast('Recarregando');
  }
  closePwd();
}

document.getElementById('reload').addEventListener('click',()=>reloadFrame(false));
document.getElementById('clearcache').addEventListener('click',()=>reloadFrame(true));
document.getElementById('cancel').addEventListener('click',closePwd);
document.getElementById('ok').addEventListener('click',()=>{
  if(s2.style.display==='none'){
    if(pin.value===state.pass){s1.style.display='none';s2.style.display='block';title.textContent='Opções';urlI.value=state.url;newp.value=''}
    else closePwd()
  }else{
    state.url=urlI.value||state.url;
    if(newp.value)state.pass=newp.value;
    localStorage.setItem('kioskm',JSON.stringify({url:state.url,pass:state.pass}));
    f.src=state.url;
    closePwd()
  }
});
pin.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ok').click()});
newp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ok').click()});
</script>
</body>
</html>
